name: Generate Directory

on:
  push:
    branches:
      - master

jobs:
  generate-directory:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Generate directory
      run: |
        echo "/* Generated directory */" > directory.css
        echo "ul#novel-list { list-style-type: none; }" >> directory.css

        echo "ul#novel-list {" >> directory.css
        for dir in $(find . -type d -name "柯*" | sort); do
          dir="${dir:2}" # remove leading './'
          echo "  li { margin-bottom: 5px; }" >> directory.css
          echo "  li a[href=\"$dir\"] { text-decoration: none; }" >> directory.css
          echo "  li a[href=\"$dir\"]:hover { text-decoration: underline; }" >> directory.css
          echo "  li ul { margin-left: 20px; }" >> directory.css
          echo "  li a[href=\"$dir\"]::before { content: \"📁 \"; }" >> directory.css
          echo "  li a[href=\"$dir\"] { display: block; }" >> directory.css
          for file in $(find "$dir" -type f -name "*.html"); do
            echo "  li a[href=\"$file\"]::before { content: \"📄 \"; }" >> directory.css
          done
        done
        echo "}" >> directory.css

    - name: Commit changes
      run: |
        git config user.name 'GitHub Action'
        git config user.email 'actions@github.com'
        git add directory.css
        git commit -m "Generate directory"

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
