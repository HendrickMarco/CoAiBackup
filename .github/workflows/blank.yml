name: Generate Directory

on:
  push:
    branches:
      - master

jobs:
  generate-directory:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Generate directory
      run: |
        echo "/* Generated directory */" > directory.css

        for dir in $(find . -type d -name "柯*" | sort); do
          echo ".${dir//\//\\}" >> directory.css
          for file in $(find "$dir" -type f -name "*.html"); do
            echo "  a[href=\"${file//\//\\}\"]::before { content: \"${dir//\//\\}\"; }" >> directory.css
          done
        done

    - name: Commit changes
      run: |
        git config user.name 'GitHub Action'
        git config user.email 'actions@github.com'
        git add directory.css
        git commit -m "Generate directory"

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
