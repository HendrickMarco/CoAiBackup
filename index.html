<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说列表</title>
  <link rel="stylesheet" href="directory.css">
</head>
<body>
  <h1>小说列表</h1>
  <ul id="novel-list">
    {% for file in files %}
      <li>
        <a href="{{ file.url }}">{{ file.name }}</a>
        {% if file.isDirectory %}
          <ul>
            {% for child in file.children %}
              <li><a href="{{ child.url }}">{{ child.name }}</a></li>
            {% endfor %}
          </ul>
        {% endif %}
      </li>
    {% endfor %}
  </ul>
</body>
</html>
